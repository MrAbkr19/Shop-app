<header>
    <section id="header">
        <div class="logo"><h1>Shop</h1></div>

        <button class="burger" (click)="toggleMenu()">☰</button>

        <nav class="navbar" [class.mobileOpen]="isMenuOpen">
            @for( link of links; track link){
                <a href="" 
                [class.active]="activeLink === link"
                (click)="setActive(link)">
                    {{link}}
                </a>
            }
        </nav>
    </section>
</header>
