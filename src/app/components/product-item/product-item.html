
<div class="box_product">

        <img [src]="product.image" alt="product">
    </div>

    <div class="info_prod">
        <h1 class="name_prod">{{product.name}}</h1>

        <div class="price border-success border-1">
            <p > {{product.price}} Fcfa</p>
        </div>
    </div>
    
</div>
